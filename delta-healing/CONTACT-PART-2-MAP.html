<section id="dhs-contact-map">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
#dhs-contact-map {
    --bg: #f6f7fb;
    --card: #ffffff;
    --border: #e6e8f2;
    --text: #202332;
    --muted: #666b7b;
    --primary: #1e4d8b;
    --accent: #3db8a8;
    --shadow: 0 10px 28px rgba(26,32,44,.07);
    --shadow-hover: 0 18px 40px rgba(26,32,44,.12);
    --radius: 20px;
    
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background:
        radial-gradient(circle at top left, rgba(30,77,139,.04), transparent 24%),
        radial-gradient(circle at bottom right, rgba(61,184,168,.035), transparent 20%),
        var(--bg);
    padding: 20px 0 70px;
}

#dhs-contact-map * {
    box-sizing: border-box;
}

#dhs-contact-map .wrap {
    width: min(1160px, calc(100% - 30px));
    margin: auto;
}

#dhs-contact-map h2 {
    margin: 0 0 12px;
    line-height: 1.15;
    color: var(--text);
    font-size: clamp(25px, 2.5vw, 34px);
    letter-spacing: -.02em;
}

#dhs-contact-map p {
    margin: 0 0 14px;
    color: var(--muted);
    line-height: 1.72;
    font-size: 16px;
}

#dhs-contact-map .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
}

#dhs-contact-map .map-container {
    padding: 32px;
    display: flex;
    flex-direction: column;
}

#dhs-contact-map .map-embed {
    flex: 1;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    min-height: 400px;
}

#dhs-contact-map .map-embed iframe {
    width: 100%;
    height: 100%;
    border: none;
    min-height: 400px;
}

#dhs-contact-map .directions-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    padding: 12px 24px;
    background: var(--primary);
    color: #fff;
    text-decoration: none;
    border-radius: 999px;
    font-weight: 700;
    font-size: 14px;
    transition: background .2s ease, transform .2s ease;
}

#dhs-contact-map .directions-btn:hover {
    background: #2a5d9b;
    transform: translateY(-1px);
}

@media (max-width: 720px) {
    #dhs-contact-map {
        padding: 20px 0 42px;
    }
    
    #dhs-contact-map .wrap {
        width: min(100% - 18px, 1160px);
    }
    
    #dhs-contact-map .map-container {
        padding: 22px;
    }
}
</style>

<div class="wrap">
    <!-- Map -->
    <div class="card map-container">
        <h2>Visit Our Clinic</h2>
        <p style="margin-bottom: 16px;">We're located in Delta, Utah, serving Millard County and surrounding areas.</p>
        
        <div class="map-embed">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3089.8247891234567!2d-112.5593524!3d39.3510231!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMznCsDIxJzAzLjciTiAxMTLCsDMzJzMzLjciVw!5e0!3m2!1sen!2sus!4v1234567890123!5m2!1sen!2sus"
                width="600"
                height="450"
                style="border:0;"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
        
        <a href="https://maps.app.goo.gl/zr9KbmTedrrQesBr6" target="_blank" class="directions-btn">
            <i class="fas fa-directions"></i>
            Get Directions
        </a>
    </div>
</div>

<!-- Schema Markup -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ContactPage",
  "mainEntity": {
    "@type": "MedicalClinic",
    "name": "Delta Healing Solutions",
    "telephone": "+1-435-864-5151",
    "email": "info@deltahealingsolutions.org",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "95 White Sage Avenue",
      "addressLocality": "Delta",
      "addressRegion": "UT",
      "postalCode": "84624",
      "addressCountry": "US"
    },
    "openingHoursSpecification": [
      {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
        "opens": "09:00",
        "closes": "16:00"
      }
    ]
  }
}
</script>

</section>
